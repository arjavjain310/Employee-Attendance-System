# Render Blueprint - Employee Attendance Management System
# https://render.com/docs/blueprint-spec
# Add DATABASE_URL (JDBC), DB_USERNAME, DB_PASSWORD in Render Dashboard if not using fromDatabase.

services:
  - type: web
    name: employee-attendance-system
    runtime: java
    plan: free

    buildCommand: mvn clean package -DskipTests
    startCommand: java -Dserver.port=$PORT -jar target/employee-attendance-system-1.0.0.jar

    envVars:
      - key: PORT
        generateValue: true
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: attendance-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: attendance-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: attendance-db
          property: password

databases:
  - name: attendance-db
    plan: free
    databaseName: attendance_db
    user: attendance_user
