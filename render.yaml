# Render Blueprint - Employee Attendance Management System
# One-click deploy: New → Blueprint → connect this repo
# Uses H2 in-memory (dev profile) - no database setup needed. Data resets on deploy.

services:
  - type: web
    name: employee-attendance-system
    runtime: java
    plan: free

    buildCommand: mvn clean package -DskipTests
    startCommand: java -Dserver.port=$PORT -jar target/employee-attendance-system-1.0.0.jar

    envVars:
      - key: PORT
        generateValue: true
      - key: SPRING_PROFILES_ACTIVE
        value: dev
