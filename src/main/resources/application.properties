# Server - Render uses PORT env variable; listen on all interfaces
server.port=${PORT:8080}
server.address=0.0.0.0
# Trust X-Forwarded-* headers when behind Render proxy
server.forward-headers-strategy=framework

# MySQL
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/attendance_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML

# Session
server.servlet.session.timeout=30m
spring.session.store-type=none

# Application
spring.application.name=Employee Attendance Management System
