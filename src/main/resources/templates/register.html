<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Attendance System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { min-height: 100vh; display: flex; align-items: center; background: linear-gradient(135deg, #1e3a5f 0%, #0d2137 100%); }
        .card { border: none; border-radius: 1rem; box-shadow: 0 1rem 3rem rgba(0,0,0,0.3); }
        .btn-primary { background: #2563eb; border: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <i class="bi bi-person-plus text-primary" style="font-size: 3rem;"></i>
                            <h2 class="mt-2 fw-bold">Register</h2>
                            <p class="text-muted">Create your in-charge account (5-digit User ID)</p>
                        </div>
                        <form th:action="@{/register}" th:object="${registerDto}" method="post">
                            <div class="mb-3">
                                <label class="form-label">User ID (exactly 5 digits)</label>
                                <input type="text" th:field="*{userId}" class="form-control" placeholder="e.g. 12345" maxlength="5" pattern="[0-9]{5}">
                                <div th:if="${#fields.hasErrors('userId')}" class="text-danger small" th:errors="*{userId}"></div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Password (min 6 characters)</label>
                                <input type="password" th:field="*{password}" class="form-control">
                                <div th:if="${#fields.hasErrors('password')}" class="text-danger small" th:errors="*{password}"></div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label">Full Name</label>
                                <input type="text" th:field="*{name}" class="form-control" placeholder="Your name">
                                <div th:if="${#fields.hasErrors('name')}" class="text-danger small" th:errors="*{name}"></div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Register</button>
                        </form>
                        <p class="text-center mt-4 text-muted small">Already have an account? <a th:href="@{/login}">Login</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
