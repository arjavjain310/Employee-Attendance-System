<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Attendance System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { min-height: 100vh; display: flex; align-items: center; background: linear-gradient(135deg, #1e3a5f 0%, #0d2137 100%); }
        .login-card { border: none; border-radius: 1rem; box-shadow: 0 1rem 3rem rgba(0,0,0,0.3); }
        .btn-primary { background: #2563eb; border: none; }
        .btn-primary:hover { background: #1d4ed8; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card login-card">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <i class="bi bi-person-badge text-primary" style="font-size: 3rem;"></i>
                            <h2 class="mt-2 fw-bold">Attendance System</h2>
                            <p class="text-muted">Sign in with your 5-digit User ID</p>
                        </div>
                        <div th:if="${param.error}" class="alert alert-danger">Invalid User ID or password.</div>
                        <div th:if="${param.logout}" class="alert alert-success">You have been logged out.</div>
                        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
                        <form th:action="@{/login}" method="post">
                            <div class="mb-3">
                                <label class="form-label">User ID (5 digits)</label>
                                <input type="text" name="username" class="form-control form-control-lg" placeholder="e.g. 12345" pattern="[0-9]{5}" maxlength="5" required autofocus>
                            </div>
                            <div class="mb-4">
                                <label class="form-label">Password</label>
                                <input type="password" name="password" class="form-control form-control-lg" required>
                            </div>
                            <button type="submit" class="btn btn-primary btn-lg w-100">Sign In</button>
                        </form>
                        <p class="text-center mt-4 text-muted small">New user? <a th:href="@{/register}">Register here</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
